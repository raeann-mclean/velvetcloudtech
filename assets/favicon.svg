<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Velvet Cloud mascot">
  <defs>
    <linearGradient id="vc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b3fd4"/>
      <stop offset="1" stop-color="#c23a9f"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect width="512" height="512" rx="120" fill="url(#vc-bg)"/>

  <!-- binary corners -->
  <g fill="#3a2a66" font-family="'Courier New', monospace" font-weight="700" font-size="46">
    <text x="120" y="150">01</text>
    <text x="392" y="150" text-anchor="end">10</text>
    <text x="120" y="470">1</text>
    <text x="392" y="470" text-anchor="end">01</text>
  </g>

  <!-- cloud / bear face -->
  <g fill="#f3ecfc">
    <circle cx="206" cy="238" r="80"/>
    <circle cx="332" cy="216" r="94"/>
    <circle cx="398" cy="288" r="60"/>
    <circle cx="150" cy="298" r="58"/>
    <ellipse cx="266" cy="296" rx="140" ry="112"/>
  </g>

  <!-- blush -->
  <g fill="#e7a4d4" opacity="0.9">
    <ellipse cx="226" cy="334" rx="22" ry="17"/>
    <ellipse cx="360" cy="330" rx="22" ry="17"/>
  </g>

  <!-- glasses + smile -->
  <g fill="none" stroke="#3b2a6b" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <rect x="198" y="262" width="84" height="60" rx="16"/>
    <rect x="300" y="262" width="84" height="60" rx="16"/>
    <path d="M282 290 H300"/>
    <path d="M198 282 H174"/>
    <path d="M384 282 H408"/>
    <path d="M408 272 V296"/>
    <path d="M222 352 Q268 398 316 350" stroke-width="12"/>
  </g>
</svg>
